---
help: |
  Migrate from a foreman-installer deployment to foremanctl.

  By default, previews the migration without making any changes.
  Use --apply to perform the actual migration.

  Without --apply, shows:
    - Mapped answer file parameters and their new values
    - Unmappable parameters that need manual review
    - Certificate state detected on the system

  With --apply, performs:
    - Writes migrated parameters to the foremanctl configuration
    - Normalizes installer certificates to the foremanctl layout
    - Backs up the original /root/ssl-build/ directory

variables:
  migrate_apply:
    help: Perform the migration. Without this flag, only previews what would happen.
    parameter: --apply
    action: store_true
    persist: false
  answer_file:
    help: Path to the foreman-installer answer file to migrate. If not specified, attempts to read from the default location.
    persist: false
  output:
    help: Path where the migrated configuration should be written. If not specified and --apply is used, writes to the foremanctl configuration.
    persist: false

include:
  - _target_host
