---
- name: Migrate from foreman-installer to foremanctl
  hosts: "{{ target_host | default('quadlet') }}"
  gather_facts: true
  become: true
  vars_files:
    - "../../vars/certificates.yml"
  roles:
    - role: migrate_foreman_installer
      when: migrate_apply | default(false)
  tasks:
    - name: Run answer file migration
      migrate_answers:
        answer_file: "{{ answer_file | default(omit) }}"
      register: migration_result

    - name: Display migrated configuration to stdout
      when: output is not defined
      ansible.builtin.debug:
        msg: "{{ migration_result.mapped | to_nice_yaml }}"

    - name: Write migrated configuration to output file
      when: output is defined
      ansible.builtin.copy:
        content: "{{ migration_result.mapped | to_nice_yaml }}"
        dest: "{{ output }}"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Write migrated configuration to parameters file
      when: migrate_apply | default(false)
      ansible.builtin.copy:
        content: "{{ migration_result.mapped | to_nice_yaml }}"
        dest: "{{ obsah_state_path }}/parameters.yaml"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Display migration results
      ansible.builtin.debug:
        msg:
          - "{{ 'Migration completed successfully!' if (migrate_apply | default(false)) else 'Migration preview (use --apply to perform the migration):' }}"
          - "Mapped parameters: {{ migration_result.mapped_count }}"
          - "Unmappable parameters: {{ migration_result.unmappable_count }}"
          - "{{ _unmappable_warning if migration_result.unmappable | length > 0 else '' }}"
      vars:
        _unmappable_warning: "Warning: {{ migration_result.unmappable | length }} parameter(s) could not be mapped - see warnings above"
