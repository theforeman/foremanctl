---
- name: Setup proxy machine
  hosts:
    - proxy
  become: true
  vars:
    flavor: foreman-proxy-content
  vars_files:
    - "../../vars/defaults.yml"
    - "../../vars/flavors/{{ flavor }}.yml"
    - "../../vars/certificates.yml"
    - "../../vars/images.yml"
    - "../../vars/tuning/{{ tuning }}.yml"
    - "../../vars/database.yml"
    - "../../vars/foreman.yml"
    - "../../vars/logging.yml"
    - "../../vars/base.yaml"
  roles:
    - role: pre_install
    - role: checks
      vars:
        checks_databases: "{{ all_databases }}"
    - role: certificates
    - role: certificate_checks
      vars:
        certificate_checks_certificate: "{{ server_certificate }}"
        certificate_checks_key: "{{ server_key }}"
        certificate_checks_ca: "{{ server_ca_certificate }}"
    - role: postgresql
      when:
        - database_mode == 'internal'
    - role: valkey
      when:
        - "'valkey' in enabled_features"
    - role: httpd
      when:
        - "'httpd' in enabled_features"
    - role: pulp
      when:
        - "'katello' in enabled_features"
    - systemd_target
    - role: foreman_proxy
      when:
        - "'foreman-proxy' in enabled_features"
    - role: post_install
      vars:
        post_install_foreman_ca_path: "{{ foreman_proxy_foreman_ca_certificate | default(omit) }}"
        post_install_foreman_oauth_consumer_key: "{{ foreman_proxy_oauth_consumer_key }}"
        post_install_foreman_oauth_consumer_secret: "{{ foreman_proxy_oauth_consumer_secret }}"
        post_install_foreman_server_url: "{{ foreman_proxy_foreman_server_url }}"
