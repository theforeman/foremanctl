---
- name: Pull images
  hosts:
    - quadlet
  vars_files:
    - "../../vars/defaults.yml"
    - "../../vars/images.yml"
  become: true
  tasks:
    - name: Install podman
      ansible.builtin.package:
        name:
          - podman
          - netavark
        update_cache: "{{ True if ansible_os_family == 'Debian' else omit }}"

    - name: Pull an image
      containers.podman.podman_image:
        name: "{{ item }}"
      loop: "{{ images }}"

    - name: Pull database images
      containers.podman.podman_image:
        name: "{{ item }}"
      loop: "{{ database_images }}"
      when:
        - database_mode == 'internal'
