---
variables:
  certificates_ca_validity_days:
    help: Lifetime of the generated CA certificate, in days.
    parameter: --certificate-ca-validity-days
  certificates_validity_days:
    help: Lifetime of the generated server and client certificates, in days.
    parameter: --certificate-validity-days
  certificates_renew:
    help: Regenerate server and client certificates previously generated by foremanctl. Does not regenerate the CA.
    parameter: --certificate-renew
    action: store_true
    persist: false
  certificates_ca_renew:
    help: Regenerate the CA certificate. Does not apply to custom certificates.
    parameter: --certificate-ca-renew
    action: store_true
    persist: false
