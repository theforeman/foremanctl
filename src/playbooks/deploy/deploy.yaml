---
- name: Setup machine
  hosts:
    - "{{ foremanctl_target | default('quadlet') }}"
  become: true
  vars_files:
    - "../../vars/defaults.yml"
    - "../../vars/flavors/{{ flavor }}.yml"
    - "../../vars/certificates.yml"
    - "../../vars/images.yml"
    - "../../vars/tuning/{{ tuning }}.yml"
    - "../../vars/database.yml"
    - "../../vars/foreman.yml"
    - "../../vars/base.yaml"
  roles:
    - role: pre_install
    - role: checks
      vars:
        checks_databases: "{{ all_databases }}"
    # TODO: Add tar_file check/extractation step for certificates_source == 'proxy'
    - role: certificates
      when: "certificates_source in ['default', 'custom_server']"
    - role: certificate_checks
      when: certificates_generate | default(true)
      vars:
        certificate_checks_certificate: "{{ server_certificate }}"
        certificate_checks_key: "{{ server_key }}"
        certificate_checks_ca: "{{ server_ca_certificate }}"
    - role: postgresql
      when:
         - database_mode == 'internal'
    - valkey
    - role: candlepin
      when: enabled_features | has_feature('candlepin')
    - httpd
    - role: pulp
      when: enabled_features | has_feature('pulp')
    - role: foreman
      when: enabled_features | has_feature('foreman')
    - role: systemd_target
    - role: iop_core
      when:
        - enabled_features | has_feature('iop')
        - database_mode == 'internal'
    - role: foreman_proxy
      when:
        - enabled_features | has_feature('foreman-proxy')
    - role: hammer
      when:
        - enabled_features | has_feature('hammer')
    - post_install
