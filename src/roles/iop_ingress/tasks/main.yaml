---
- name: Deploy iop-ingress image
  ansible.builtin.include_tasks: image.yaml

- name: Deploy Ingress container
  containers.podman.podman_container:
    name: iop-core-ingress
    image: iop-ingress.image
    state: quadlet
    env:
      INGRESS_VALID_UPLOAD_TYPES: "advisor,compliance,qpc,rhv,tower,leapp-reporting,xavier,playbook,playbook-sat,malware-detection,tasks"
      INGRESS_KAFKABROKERS: "iop-core-kafka:9092"
      INGRESS_AUTH: "false"
      BOOTSTRAP_SERVERS: "iop-core-kafka:9092"
      INGRESS_STAGERIMPLEMENTATION: "filebased"
      INGRESS_STORAGEFILESYSTEMPATH: "/var/tmp"
      INGRESS_SERVICEBASEURL: "http://iop-core-ingress:8080"
      INGRESS_WEBPORT: "8080"
      INGRESS_METRICSPORT: "3001"
    network:
      - iop-core-network
    quadlet_options:
      - |
        [Unit]
        Description=IOP Core Ingress Container
        PartOf=foreman.target
        [Service]
        Restart=on-failure
        [Install]
        WantedBy=default.target foreman.target

- name: Run daemon reload to make Quadlet create the service files
  ansible.builtin.systemd:
    daemon_reload: true

- name: Flush handlers to restart services
  ansible.builtin.meta: flush_handlers

- name: Start Ingress service
  ansible.builtin.systemd:
    name: iop-core-ingress
    state: started
