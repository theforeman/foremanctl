---
- name: Load OAuth credentials from certificate bundle
  vars:
    oauth_path: "{{ certificates_ca_directory }}/foreman-oauth-consumer-{{ oauth_credential }}"
  block:
    - name: Check for OAuth consumer file in certificate bundle - {{ oauth_credential }}
      ansible.builtin.stat:
        path: "{{ oauth_path }}"
      register: foreman_proxy_oauth_file

    - name: Read OAuth consumer from certificate bundle - {{ oauth_credential }}
      when: foreman_proxy_oauth_file.stat.exists
      block:
        - name: Slurp OAuth consumer - {{ oauth_credential }}
          ansible.builtin.slurp:
            src: "{{ oauth_path }}"
          register: foreman_proxy_oauth_content

        - name: Set OAuth consumer from certificate bundle - {{ oauth_credential }}
          ansible.builtin.set_fact:
            "foreman_proxy_oauth_consumer_{{ oauth_credential }}": "{{ foreman_proxy_oauth_content.content | b64decode | trim }}"
