---
- name: Deploy valkey image
  ansible.builtin.include_tasks: image.yaml

- name: Cleanup Redis
  ansible.builtin.include_tasks: cleanup_redis.yaml

- name: Create directory for Valkey data
  ansible.builtin.file:
    path: /var/lib/valkey
    state: directory
    owner: 1001
    group: 1001
    mode: '0755'

- name: Run Valkey as a container
  containers.podman.podman_container:
    name: valkey
    image: valkey.image
    state: quadlet
    network: host
    sdnotify: true
    command: ["run-valkey", "--supervised", "systemd", "--loglevel", "{{ valkey_log_level }}"]
    volumes:
      - /var/lib/valkey:/data:rw,Z
    quadlet_options:
      - |
        [Install]
        WantedBy=default.target foreman.target
        [Unit]
        PartOf=foreman.target
  notify: Restart valkey

- name: Run daemon reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Start the Valkey Service
  ansible.builtin.systemd:
    name: valkey
    state: started
