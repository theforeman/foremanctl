---
- name: Deploy valkey image
  ansible.builtin.include_tasks: image.yaml

- name: Cleanup Redis
  ansible.builtin.include_tasks: cleanup_redis.yaml

- name: Create directory for Valkey data
  ansible.builtin.file:
    path: /var/lib/valkey
    state: directory
    mode: '0755'

- name: Run Valkey as a container
  containers.podman.podman_container:
    name: valkey
    image: valkey.image
    state: quadlet
    network: host
    sdnotify: true
    command: ["run-valkey", "--supervised", "systemd"]
    userns: "auto"
    volumes:
      # :U chowns host path to the remapped container UID (required with userns=auto)
      - /var/lib/valkey:/data:rw,Z,U
    quadlet_options:
      - |
        [Install]
        WantedBy=default.target foreman.target
        [Unit]
        PartOf=foreman.target

- name: Run daemon reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Start the Valkey Service
  ansible.builtin.systemd:
    name: valkey
    state: started
