---
- name: Populate service facts
  ansible.builtin.service_facts:

- name: Stop Redis service
  ansible.builtin.service:
    name: redis
    state: stopped
  when: ansible_facts['services']['redis.service']['status'] | default('not-found') != 'not-found'

- name: Remove Redis package
  ansible.builtin.package:
    name: redis
    state: absent

- name: Remove Redis image and container definitions
  containers.podman.podman_quadlet:
    state: absent
    name:
      - redis.image
      - redis.container

- name: Remove Redis image drop-in directory
  ansible.builtin.file:
    path: /etc/containers/systemd/redis.image.d
    state: absent
