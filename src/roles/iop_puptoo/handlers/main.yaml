---
- name: Check if puptoo service exists
  ansible.builtin.systemd:
    name: iop-core-puptoo
  register: iop_puptoo_service_status
  failed_when: false
  listen: restart puptoo

- name: Restart puptoo service if it exists
  ansible.builtin.systemd:
    name: iop-core-puptoo
    state: restarted
  when: iop_puptoo_service_status.status is defined and iop_puptoo_service_status.status.LoadState != "not-found"
  listen: restart puptoo
