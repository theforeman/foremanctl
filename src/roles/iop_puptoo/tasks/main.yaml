---
- name: Deploy iop-puptoo image
  ansible.builtin.include_tasks: image.yaml

- name: Deploy Puptoo container
  containers.podman.podman_container:
    name: iop-core-puptoo
    image: iop-puptoo.image
    state: quadlet
    env:
      BOOTSTRAP_SERVERS: "iop-core-kafka:9092"
      DISABLE_REDIS: "True"
      DISABLE_S3_UPLOAD: "True"
    network:
      - iop-core-network
    quadlet_options:
      - |
        [Unit]
        Description=IOP Core Puptoo Container
        After=iop-core-kafka.service
        Wants=iop-core-kafka.service
        PartOf=foreman.target
        [Service]
        Restart=on-failure
        [Install]
        WantedBy=default.target foreman.target

- name: Run daemon reload to make Quadlet create the service files
  ansible.builtin.systemd:
    daemon_reload: true

- name: Flush handlers to restart services
  ansible.builtin.meta: flush_handlers

- name: Start Puptoo service
  ansible.builtin.systemd:
    name: iop-core-puptoo
    state: started
