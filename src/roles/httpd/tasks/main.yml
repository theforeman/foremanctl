---
- name: Install Apache httpd
  ansible.builtin.package:
    name:
      - httpd
      - mod_ssl
    state: present

- name: Set httpd_can_network_connect so Apache can connect to Puma and Gunicorn
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  when: ansible_facts['selinux']['status'] == "enabled"

- name: Disable welcome page
  ansible.builtin.file:
    path: /etc/httpd/conf.d/welcome.conf
    state: absent

- name: Create cert directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - "{{ httpd_ssl_dir }}/certs"
    - "{{ httpd_ssl_dir }}/private"

- name: Create pub directory
  ansible.builtin.file:
    path: "{{ httpd_pub_dir }}"
    state: directory
    group: apache
    owner: apache
    mode: "0755"

- name: Deploy certificates
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ httpd_ssl_dir }}/{{ item.dest }}"
    remote_src: true
    mode: "0640"
  loop:
    - src: "{{ httpd_server_ca_certificate }}"
      dest: "certs/katello-server-ca.crt"
    - src: "{{ httpd_client_ca_certificate }}"
      dest: "certs/katello-default-ca.crt"
    - src: "{{ httpd_server_certificate }}"
      dest: "certs/katello-apache.crt"
    - src: "{{ httpd_server_key }}"
      dest: "private/katello-apache.key"

- name: Copy CA certificate to pub directory for client trust
  ansible.builtin.copy:
    src: "{{ httpd_server_ca_certificate }}"
    dest: "{{ httpd_pub_dir }}/katello-server-ca.crt"
    remote_src: true
    mode: "0644"

- name: Configure external authentication
  when: httpd_external_authentication in ['ipa', 'ipa_with_api']
  block:
    - name: Install Apache modules for IPA authentication
      ansible.builtin.package:
        name:
          - mod_authnz_pam
          - mod_intercept_form_submit
          - mod_lookup_identity
          - mod_auth_gssapi
        state: present

    - name: Create directory for Apache module configuration
      ansible.builtin.file:
        path: /etc/httpd/conf.modules.d
        state: directory
        mode: "0755"

    - name: Load Apache modules for IPA authentication
      ansible.builtin.copy:
        dest: /etc/httpd/conf.modules.d/55-{{ item }}.conf
        content: |
          LoadModule {{ item }}_module modules/mod_{{ item }}.so
        mode: "0644"
      loop:
        - authnz_pam
        - intercept_form_submit
        - lookup_identity
        - auth_gssapi
      notify:
        - Restart httpd

    - name: Set SELinux booleans for IPA authentication
      ansible.posix.seboolean:
        name: "{{ item }}"
        state: true
        persistent: true
      loop:
        - allow_httpd_mod_auth_pam
        - httpd_dbus_sssd
      when: ansible_facts['selinux']['status'] == "enabled"

    - name: Configure SSSD for IPA authentication
      ansible.builtin.import_tasks: sssd.yml
      when: httpd_ipa_manage_sssd | bool

    - name: Create PAM service file for IPA authentication
      ansible.builtin.template:
        src: pam_service.j2
        dest: "/etc/pam.d/{{ httpd_ipa_pam_service }}"
        mode: "0644"

    - name: Ensure keytab directory exists
      ansible.builtin.file:
        path: "{{ httpd_ipa_keytab | dirname }}"
        state: directory
        mode: "0755"

    - name: Get keytab for HTTP service
      ansible.builtin.shell:
        cmd: |
          KRB5CCNAME=KEYRING:session:get-http-service-keytab kinit -k || true
          KRB5CCNAME=KEYRING:session:get-http-service-keytab /usr/sbin/ipa-getkeytab -k {{ httpd_ipa_keytab }} -p HTTP/{{ ansible_facts['fqdn'] }}
          kdestroy -c KEYRING:session:get-http-service-keytab || true
        creates: "{{ httpd_ipa_keytab }}"
      changed_when: false

    - name: Set keytab file permissions
      ansible.builtin.file:
        path: "{{ httpd_ipa_keytab }}"
        owner: apache
        group: apache
        mode: "0600"

    - name: Create directory for Apache configuration fragments
      ansible.builtin.file:
        path: /etc/httpd/conf.d/05-foreman-ssl.d
        state: directory
        mode: "0755"

    - name: Deploy external authentication configuration
      ansible.builtin.template:
        src: external_auth.conf.j2
        dest: /etc/httpd/conf.d/05-foreman-ssl.d/external_auth.conf
        mode: "0644"
      notify:
        - Restart httpd

- name: Remove external authentication configuration if not enabled
  when: httpd_external_authentication not in ['ipa', 'ipa_with_api']
  block:
    - name: Remove external authentication configuration
      ansible.builtin.file:
        path: /etc/httpd/conf.d/05-foreman-ssl.d/external_auth.conf
        state: absent
      notify:
        - Restart httpd

    - name: Load Apache modules for IPA authentication
      ansible.builtin.copy:
        dest: /etc/httpd/conf.modules.d/55-{{ item }}.conf
        content: |
          # LoadModule {{ item }}_module modules/mod_{{ item }}.so
        mode: "0644"
      loop:
        - authnz_pam
        - intercept_form_submit
        - lookup_identity
        - auth_gssapi
      notify:
        - Restart httpd

- name: Configure foreman vhost
  ansible.builtin.template:
    src: foreman-vhost.conf.j2
    dest: /etc/httpd/conf.d/foreman.conf
    mode: "0644"
  notify:
    - Restart httpd

- name: Configure foreman-ssl vhost
  ansible.builtin.template:
    src: foreman-ssl-vhost.conf.j2
    dest: /etc/httpd/conf.d/foreman-ssl.conf
    mode: "0644"
  notify:
    - Restart httpd

- name: Flush handlers to restart services
  ansible.builtin.meta: flush_handlers

- name: Start Apache httpd
  ansible.builtin.service:
    name: httpd
    state: started
    enabled: true
