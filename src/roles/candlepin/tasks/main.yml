---
- name: Deploy candlepin image
  ansible.builtin.include_tasks: image.yaml

- name: Configure certificates
  ansible.builtin.include_tasks:
    file: certs.yml

- name: Create Candlepin configuration
  containers.podman.podman_secret:
    state: present
    name: candlepin-candlepin-conf
    data: "{{ lookup('ansible.builtin.template', 'candlepin.conf.j2') }}"
    labels:
      filename: candlepin.conf
      app: candlepin
  notify:
    - Restart candlepin

- name: Create Tomcat server.xml
  containers.podman.podman_secret:
    state: present
    name: candlepin-tomcat-server-xml
    data: "{{ lookup('ansible.builtin.template', 'server.xml.j2') }}"
    labels:
      filename: server.xml
      app: tomcat
  notify:
    - Restart candlepin

- name: Create Tomcat server configuration
  containers.podman.podman_secret:
    state: present
    name: candlepin-tomcat-conf
    data: "{{ lookup('ansible.builtin.template', 'tomcat.conf.j2') }}"
    labels:
      filename: tomcat.conf
      app: tomcat
  notify:
    - Restart candlepin

- name: Create Candlepin logback configuration
  containers.podman.podman_secret:
    state: present
    name: candlepin-logback-xml
    data: "{{ lookup('ansible.builtin.template', 'logback.xml') }}"
    labels:
      filename: logback.xml
      app: candlepin
  notify:
    - Restart candlepin

- name: Create Tomcat logging configuration
  containers.podman.podman_secret:
    state: present
    name: candlepin-tomcat-logging-properties
    data: "{{ lookup('ansible.builtin.template', 'logging.properties') }}"
    labels:
      filename: logging.properties
      app: tomcat
  notify:
    - Restart candlepin

- name: Create DB SSL cert
  containers.podman.podman_secret:
    state: present
    name: candlepin-db-ca
    data: "{{ lookup('ansible.builtin.file', candlepin_database_ssl_ca) if candlepin_database_ssl_ca else 'empty' }}"
  notify:
    - Restart candlepin

- name: Deploy Candlepin quadlet
  containers.podman.podman_container:
    name: "candlepin"
    image: candlepin.image
    state: quadlet
    network: host
    hostname: "{{ ansible_facts['hostname'] }}.local"
    secrets:
      - 'candlepin-ca-cert,target=/etc/candlepin/certs/candlepin-ca.crt,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-ca-key,target=/etc/candlepin/certs/candlepin-ca.key,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-tomcat-cert,target=/etc/candlepin/certs/tomcat.crt,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-tomcat-key,target=/etc/candlepin/certs/tomcat.key,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-candlepin-conf,target=/etc/candlepin/candlepin.conf,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-tomcat-server-xml,target=/etc/tomcat/server.xml,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-tomcat-conf,target=/etc/tomcat/tomcat.conf,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-tomcat-logging-properties,target=/etc/tomcat/logging.properties,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-logback-xml,target=/var/lib/tomcat/webapps/candlepin/WEB-INF/classes/logback.xml,{{ candlepin_secret_mount_opts }}'
      - 'candlepin-db-ca,target={{ candlepin_database_ssl_ca_path }},{{ candlepin_secret_mount_opts }}'
    quadlet_options:
      - |
        [Install]
        WantedBy=default.target foreman.target
        [Unit]
        PartOf=foreman.target
        Wants=valkey.service postgresql.service
        After=valkey.service postgresql.service
        [Service]
        TimeoutStartSec=300
    healthcheck: curl --fail --insecure --noproxy localhost https://localhost:23443/candlepin/status
    sdnotify: healthy

- name: Run daemon reload to make Quadlet create the service files
  ansible.builtin.systemd:
    daemon_reload: true

- name: Flush handlers to restart services
  ansible.builtin.meta: flush_handlers

- name: Start the Candlepin Service
  ansible.builtin.systemd:
    name: candlepin
    state: started
