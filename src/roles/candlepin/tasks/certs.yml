---
- name: Create the podman secret for Candlepin CA certificate
  containers.podman.podman_secret:
    state: present
    name: candlepin-ca-cert
    path: "{{ candlepin_ca_certificate }}"
    labels:
      app: candlepin
  notify:
    - Restart candlepin

- name: Decrypt Candlepin CA key
  ansible.builtin.command: openssl pkey -in "{{ candlepin_ca_key }}" -passin "file:{{ candlepin_ca_key_password }}"
  register: _candlepin_ca_key
  changed_when: false

- name: Create the podman secret for Candlepin CA key
  containers.podman.podman_secret:
    state: present
    name: candlepin-ca-key
    data: "{{ _candlepin_ca_key.stdout }}"
    labels:
      app: candlepin
  notify:
    - Restart candlepin

- name: Create the podman secret for Tomcat certificate
  containers.podman.podman_secret:
    state: present
    name: candlepin-tomcat-cert
    path: "{{ candlepin_tomcat_certificate }}"
    labels:
      app: tomcat
  notify:
    - Restart candlepin

- name: Create the podman secret for Tomcat key
  containers.podman.podman_secret:
    state: present
    name: candlepin-tomcat-key
    path: "{{ candlepin_tomcat_key }}"
    labels:
      app: tomcat
  notify:
    - Restart candlepin
