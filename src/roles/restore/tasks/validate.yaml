---
- name: Check if foremanctl is already deployed
  ansible.builtin.stat:
    path: /var/lib/foremanctl
  register: restore_existing_deployment

- name: Fail if restoring over existing system without --force
  ansible.builtin.fail:
    msg: |
      DESTRUCTIVE OPERATION WARNING:

      An existing Foreman deployment was detected on this system.
      Restore will PERMANENTLY DELETE all current data including:
      - All databases (Foreman, Candlepin, Pulp, etc.)
      - All Pulp content
      - All configuration

      There is NO UNDO operation.

      If you are certain you want to proceed, re-run with --force:
        foremanctl restore {{ backup_dir }} --force
  when:
    - restore_existing_deployment.stat.exists
    - not force | default(false)
    - not validate | default(false)

- name: Check if backup directory exists
  ansible.builtin.stat:
    path: "{{ backup_dir }}"
  register: restore_backup_dir_stat

- name: Fail if backup directory does not exist
  ansible.builtin.fail:
    msg: "Backup directory does not exist: {{ backup_dir }}"
  when: not restore_backup_dir_stat.stat.exists

- name: Check for metadata.yml
  ansible.builtin.stat:
    path: "{{ backup_dir }}/metadata.yml"
  register: restore_metadata_stat

- name: Fail if metadata.yml is missing
  ansible.builtin.fail:
    msg: "Backup metadata file not found: {{ backup_dir }}/metadata.yml"
  when: not restore_metadata_stat.stat.exists

- name: Read backup metadata
  ansible.builtin.slurp:
    path: "{{ backup_dir }}/metadata.yml"
  register: restore_metadata_content

- name: Parse backup metadata
  ansible.builtin.set_fact:
    restore_backup_metadata: "{{ restore_metadata_content['content'] | b64decode | from_yaml }}"

- name: Build name to database mapping
  ansible.builtin.set_fact:
    restore_name_to_db_map:
      foreman: "{{ foreman_database_name }}"
      candlepin: "{{ candlepin_database_name }}"
      pulp: "{{ pulp_database_name }}"
      iop_advisor: "{{ iop_advisor_database_name }}"
      iop_inventory: "{{ iop_inventory_database_name }}"
      iop_remediation: "{{ iop_remediation_database_name }}"
      iop_vmaas: "{{ iop_vmaas_database_name }}"
      iop_vulnerability: "{{ iop_vulnerability_database_name }}"

- name: Build list of expected dump files
  ansible.builtin.set_fact:
    restore_expected_dump_files: >-
      {{
        restore_backup_metadata.databases |
        map('extract', restore_name_to_db_map) |
        map('regex_replace', '$', '.dump') |
        list
      }}

- name: Verify required backup files exist
  ansible.builtin.stat:
    path: "{{ backup_dir }}/{{ item }}"
  register: restore_required_files
  failed_when: not restore_required_files.stat.exists
  loop: "{{ restore_expected_dump_files }}"

- name: Check for foremanctl-state archive
  ansible.builtin.stat:
    path: "{{ backup_dir }}/foremanctl-state.tar.gz"
  register: restore_state_archive

- name: Fail if foremanctl-state is missing
  ansible.builtin.fail:
    msg: "CRITICAL: foremanctl-state.tar.gz not found in backup! Cannot restore OAuth keys and passwords."
  when: not restore_state_archive.stat.exists

- name: Check available disk space for PostgreSQL
  ansible.builtin.shell: df -BG /var/lib/pgsql | awk 'NR==2 {print $4}' | sed 's/G//'
  register: restore_pgsql_space
  changed_when: false
  when: database_mode == 'internal'

- name: Get total size of database dumps
  ansible.builtin.shell: du -sB1 {{ backup_dir }}/*.dump 2>/dev/null | awk '{sum+=$1} END {print int(sum/1024/1024/1024)+1}'
  register: restore_dumps_size
  changed_when: false
  failed_when: false

- name: Warn if insufficient PostgreSQL disk space
  ansible.builtin.debug:
    msg: "WARNING: Available space ({{ restore_pgsql_space.stdout }}GB) may be insufficient for database dumps (~{{ restore_dumps_size.stdout }}GB needed)"
  when:
    - database_mode == 'internal'
    - restore_dumps_size.stdout | int > 0
    - restore_pgsql_space.stdout | int < restore_dumps_size.stdout | int

- name: Check available disk space for Pulp content
  ansible.builtin.shell: df -BG /var/lib/pulp | awk 'NR==2 {print $4}' | sed 's/G//'
  register: restore_pulp_space
  changed_when: false

- name: Get Pulp content archive size
  ansible.builtin.stat:
    path: "{{ backup_dir }}/pulp-content.tar.gz"
  register: restore_pulp_archive
  when: restore_pulp_archive is defined

- name: Warn if insufficient Pulp disk space
  ansible.builtin.debug:
    msg: "WARNING: Available space ({{ restore_pulp_space.stdout }}GB) may be insufficient for Pulp content ({{ (restore_pulp_archive.stat.size / 1024 / 1024 / 1024) | int + 1 }}GB needed)"
  when:
    - restore_pulp_archive.stat.exists | default(false)
    - restore_pulp_space.stdout | int < (restore_pulp_archive.stat.size / 1024 / 1024 / 1024) | int + 1

- name: Check database mode matches backup
  ansible.builtin.debug:
    msg: "WARNING: Current database_mode ({{ database_mode }}) may not match backup configuration. Verify compatibility before proceeding."
  when: restore_backup_metadata.database_mode is defined and restore_backup_metadata.database_mode != database_mode
