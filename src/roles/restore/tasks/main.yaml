---
- name: Run validation checks
  ansible.builtin.include_tasks:
    file: validate.yaml

- name: Perform restore operations
  when: not validate | default(false)
  block:
    - name: Restore full backup chain (if --restore-chain and incremental)
      ansible.builtin.include_tasks:
        file: restore_chain.yaml
      when: restore_chain | default(false) and restore_is_incremental

    - name: Restore single backup (standard mode)
      when: not (restore_chain | default(false) and restore_is_incremental)
      block:
        - name: Restore foremanctl state
          ansible.builtin.include_tasks:
            file: restore_foremanctl_state.yaml

        - name: Prepare system for restore
          ansible.builtin.include_tasks:
            file: prepare_system.yaml

        - name: Restore databases
          ansible.builtin.include_tasks:
            file: restore_databases.yaml

        - name: Restore Pulp content
          ansible.builtin.include_tasks:
            file: restore_pulp_content.yaml

        - name: Record successful restore timestamp
          ansible.builtin.copy:
            content: "{{ restore_backup_metadata.timestamp }}"
            dest: /var/lib/foremanctl/.last_restore_timestamp
            mode: '0644'

    - name: Display restore completion
      ansible.builtin.debug:
        msg: |
          Restore completed successfully!
          Backup: {{ backup_dir }}
          Type: {{ 'Incremental' if restore_is_incremental else 'Full' }}
          Timestamp: {{ restore_backup_metadata.timestamp }}

  rescue:
    - name: Ensure services are stopped on failure
      ansible.builtin.systemd:
        name: foreman.target
        state: stopped
      failed_when: false

    - name: Report failure
      ansible.builtin.fail:
        msg: |
          Restore failed: {{ ansible_failed_result.msg | default('Unknown error') }}

          System state: Services stopped
          The system has been left in a stopped state for investigation.

          To recover:
          1. Review the error above
          2. Fix any issues with the backup or system
          3. Re-run the restore command

          If you need to start services without restoring, run: systemctl start foreman.target
