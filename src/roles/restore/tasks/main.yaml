---
# Main restore orchestration

- name: Run validation checks
  ansible.builtin.include_tasks:
    file: validate.yaml

- name: Perform restore operations
  block:
    - name: Phase 2 - Prepare system for restore
      ansible.builtin.include_tasks:
        file: prepare_system.yaml

    - name: Phase 2 complete
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          Phase 2 Complete: System prepared for restore!
          ═══════════════════════════════════════════════════════════════

    - name: Phase 3 - Restore databases
      ansible.builtin.include_tasks:
        file: restore_databases.yaml

    - name: Phase 3 complete
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          Phase 3 Complete: Databases restored!
          ═══════════════════════════════════════════════════════════════

    - name: Phase 4 - Restore Pulp content
      ansible.builtin.include_tasks:
        file: restore_pulp_content.yaml

    - name: Phase 4 complete
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════════════════
          Phase 4 Complete: Pulp content restored!

          Next phases (not yet implemented):
          - Phase 5: Deploy and verify
          ═══════════════════════════════════════════════════════════════

  rescue:
    - name: Stop PostgreSQL on failure
      ansible.builtin.systemd:
        name: postgresql.service
        state: stopped
      when:
        - database_mode == 'internal'
        - restore_postgresql_started | default(false)
      failed_when: false

    - name: Restart Foreman services on failure
      ansible.builtin.systemd:
        name: foreman.target
        state: started
      when: restore_service_stopped | default(false)
      failed_when: false

    - name: Report failure
      ansible.builtin.fail:
        msg: |
          Restore failed: {{ ansible_failed_result.msg | default('Unknown error') }}
          Services have been restarted.
          System is back to running state.
