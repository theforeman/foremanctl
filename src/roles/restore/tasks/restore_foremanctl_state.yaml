---
- name: Remove existing foremanctl state directory
  ansible.builtin.file:
    path: "{{ obsah_state_path }}"
    state: absent

- name: Ensure state directory parent exists
  ansible.builtin.file:
    path: "{{ obsah_state_path | dirname }}"
    state: directory
    mode: '0755'

- name: Extract foremanctl state archive
  ansible.builtin.unarchive:
    src: "{{ backup_dir }}/foremanctl-state.tar.gz"
    dest: "{{ obsah_state_path | dirname }}"
    remote_src: true

- name: Build list of expected state files
  ansible.builtin.set_fact:
    restore_expected_state_files: >-
      {{
        ['parameters.yaml', 'foreman-oauth-consumer-key', 'foreman-oauth-consumer-secret', 'postgresql-admin-password'] +
        (restore_backup_metadata.databases | map('regex_replace', '_', '-') | map('regex_replace', '$', '-db-password') | list)
      }}

- name: Verify critical files were restored
  ansible.builtin.stat:
    path: "{{ obsah_state_path }}/{{ item }}"
  register: restore_state_files
  failed_when: not restore_state_files.stat.exists
  loop: "{{ restore_expected_state_files }}"
