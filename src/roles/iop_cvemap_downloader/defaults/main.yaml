---
iop_cvemap_downloader_base_url: "https://security.access.redhat.com/data/meta/v1/cvemap.xml"
iop_cvemap_downloader_timer_interval: "24h"
iop_cvemap_downloader_output_dir: "/var/www/html/pub"
iop_cvemap_downloader_relative_path: "iop/data/meta/v1/cvemap.xml"

iop_cvemap_downloader_client_cert: "/var/lib/foremanctl/certs/certs/{{ ansible_facts['fqdn'] }}-client.crt"
iop_cvemap_downloader_client_key: "/var/lib/foremanctl/certs/private/{{ ansible_facts['fqdn'] }}-client.key"
iop_cvemap_downloader_client_ca: "/var/lib/foremanctl/certs/certs/ca.crt"
