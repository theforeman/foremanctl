---
- name: Load OAuth credential from certificate bundle - {{ oauth_from_bundle_credential }}
  vars:
    oauth_from_bundle_path: "{{ oauth_from_bundle_directory }}/foreman-oauth-consumer-{{ oauth_from_bundle_credential }}"
  block:
    - name: Check for OAuth consumer file in certificate bundle - {{ oauth_from_bundle_credential }}
      ansible.builtin.stat:
        path: "{{ oauth_from_bundle_path }}"
      register: oauth_from_bundle_file

    - name: Fail when OAuth consumer is missing from certificate bundle - {{ oauth_from_bundle_credential }}
      ansible.builtin.fail:
        msg: >-
          OAuth consumer {{ oauth_from_bundle_credential }} not found in certificate bundle
          at {{ oauth_from_bundle_path }}.
          Regenerate the bundle with foremanctl certificate-bundle.
      when: not oauth_from_bundle_file.stat.exists

    - name: Slurp OAuth consumer - {{ oauth_from_bundle_credential }}
      ansible.builtin.slurp:
        src: "{{ oauth_from_bundle_path }}"
      register: oauth_from_bundle_content

    - name: Set OAuth consumer from certificate bundle - {{ oauth_from_bundle_credential }}
      ansible.builtin.set_fact:
        "foreman_proxy_oauth_consumer_{{ oauth_from_bundle_credential }}": "{{ oauth_from_bundle_content.content | b64decode | trim }}"
        "pulp_foreman_oauth_consumer_{{ oauth_from_bundle_credential }}": "{{ oauth_from_bundle_content.content | b64decode | trim }}"
