---
certificates_source: default
certificates_ca: true
certificates_ca_directory: /var/lib/foremanctl/certs
certificates_ca_directory_certs: "{{ certificates_ca_directory }}/certs"
certificates_ca_directory_keys: "{{ certificates_ca_directory }}/private"
certificates_ca_directory_requests: "{{ certificates_ca_directory }}/requests"
certificates_output_directory: "{{ certificates_ca_directory }}"
certificates_output_directory_certs: "{{ certificates_output_directory }}/certs"
certificates_output_directory_keys: "{{ certificates_output_directory }}/private"
certificates_output_directory_requests: "{{ certificates_output_directory }}/requests"
certificates_ca_subject: 'Foreman Self-signed CA'
certificates_cnames: []
certificates_algorithm_type: RSA
certificates_algorithm_size: 4096
certificates_ca_validity_days: 7300
certificates_validity_days: 7300
certificates_renew: false
certificates_ca_renew: false
certificates_generate: true
