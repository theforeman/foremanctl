---
- name: Gather package facts
  ansible.builtin.package_facts:

- name: Query container images
  containers.podman.podman_image_info:
  register: backup_container_images_result
  failed_when: false

- name: Build detailed container image list
  ansible.builtin.set_fact:
    backup_container_images_detailed: >-
      {{
        backup_container_images_detailed | default([]) +
        [{
          'name': (item.RepoTags | first) if item.RepoTags | default([]) | length > 0 else '<none>',
          'digest': (item.RepoDigests | first) if item.RepoDigests | default([]) | length > 0 else '',
          'id': item.Id,
          'created': item.Created
        }]
      }}
  loop: "{{ backup_container_images_result.images | default([]) }}"
  when: backup_container_images_result is succeeded
  no_log: true

- name: Check if pulp content was backed up
  ansible.builtin.stat:
    path: "{{ backup_dir_full }}/pulp-content.tar.gz"
  register: backup_pulp_content_backup_check
  failed_when: false

- name: Write metadata file
  ansible.builtin.copy:
    content: "{{ backup_metadata | to_nice_yaml }}"
    dest: "{{ backup_dir_full }}/metadata.yml"
    mode: '0644'
  vars:
    backup_metadata:
      hostname: "{{ ansible_facts['fqdn'] }}"
      os_version: "{{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
      foremanctl_version: "{{ ansible_facts.packages['foremanctl'][0].version | default('unknown') if 'foremanctl' in ansible_facts.packages else 'unknown' }}"
      type: offline
      incremental:
        is_incremental: "{{ (incremental is defined and incremental | length > 0) | bool }}"
        base_backup_dir: "{{ incremental | default('') }}"
        base_backup_timestamp: "{{ (backup_previous_metadata | default({})).timestamp | default('') }}"
      timestamp: "{{ backup_timestamp }}"
      databases: "{{ backup_databases_to_backup }}"
      database_mapping: "{{ backup_databases_config | items2dict(key_name='name', value_name='database') }}"
      enabled_features: "{{ enabled_features | default([]) }}"
      database_mode: "{{ backup_database_mode }}"
      container_images: "{{ backup_container_images_detailed | default([]) }}"
      backed_up_components: >-
        {{
          [
            'databases',
            'container_images',
            'foremanctl_state'
          ] + (['pulp_content'] if backup_pulp_content_backup_check.stat.exists | default(false) else [])
        }}

- name: Display metadata location
  ansible.builtin.debug:
    msg: "Backup metadata written to {{ backup_dir_full }}/metadata.yml"
