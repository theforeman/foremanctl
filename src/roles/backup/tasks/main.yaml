---
- name: Set backup timestamp
  ansible.builtin.set_fact:
    backup_timestamp: "{{ ansible_facts['date_time']['iso8601_basic_short'] }}"

- name: Set full backup directory path
  ansible.builtin.set_fact:
    backup_dir_full: "{{ backup_dir }}/foreman-backup-{{ backup_timestamp }}"

- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0770'

- name: Test write permissions
  ansible.builtin.file:
    path: "{{ backup_dir }}/.write_test"
    state: touch
    mode: '0644'
  register: backup_write_test
  changed_when: false

- name: Remove write test file
  ansible.builtin.file:
    path: "{{ backup_dir }}/.write_test"
    state: absent
  when: backup_write_test is succeeded
  changed_when: false

- name: Perform backup operations
  block:
    - name: Run preflight checks
      ansible.builtin.include_tasks:
        file: preflight.yaml

    - name: Create timestamped backup directory
      ansible.builtin.file:
        path: "{{ backup_dir_full }}"
        state: directory
        mode: '0770'

    - name: Stop Foreman services
      ansible.builtin.systemd:
        name: foreman.target
        state: stopped

    - name: Wait for PostgreSQL to fully stop
      ansible.builtin.systemd:
        name: postgresql.service
      register: backup_postgres_status
      until: backup_postgres_status.status.ActiveState in ['inactive', 'failed']
      retries: "{{ backup_postgresql_stop_retries }}"
      delay: "{{ backup_postgresql_stop_delay }}"
      when: backup_database_mode == 'internal'
      changed_when: false

    - name: Start PostgreSQL for dumps
      ansible.builtin.systemd:
        name: postgresql.service
        state: started
      when: backup_database_mode == 'internal'

    - name: Wait for PostgreSQL readiness
      ansible.builtin.command:
        cmd: pg_isready -h {{ database_host }} -p {{ database_port }}
      register: backup_pg_ready
      retries: "{{ backup_postgresql_ready_retries }}"
      delay: "{{ backup_postgresql_ready_delay }}"
      until: backup_pg_ready.rc == 0
      changed_when: false

    - name: Build database backup configuration
      ansible.builtin.set_fact:
        backup_databases_config: "{{ backup_databases_config | default([]) + [db_entry] }}"
      vars:
        db_entry:
          name: "{{ item.name }}"
          database: "{{ item.database }}"
          host: "{{ database_host }}"
          port: "{{ database_port }}"
          user: "{{ item.user }}"
          password: "{{ item.password }}"
      loop: "{{ backup_databases }}"
      no_log: true

    - name: Build database names list for display
      ansible.builtin.set_fact:
        backup_databases_to_backup: "{{ backup_databases | map(attribute='name') | list }}"

    - name: Dump databases
      ansible.builtin.include_tasks:
        file: database_dumps.yaml

    - name: Copy incremental metadata from previous backup
      when: incremental is defined and incremental | length > 0
      block:
        - name: Validate previous backup directory exists
          ansible.builtin.stat:
            path: "{{ incremental }}/metadata.yml"
          register: backup_previous_metadata_file
          failed_when: not backup_previous_metadata_file.stat.exists

        - name: Read previous backup metadata
          ansible.builtin.slurp:
            path: "{{ incremental }}/metadata.yml"
          register: backup_previous_metadata_content

        - name: Parse previous backup metadata
          ansible.builtin.set_fact:
            backup_previous_metadata: "{{ backup_previous_metadata_content['content'] | b64decode | from_yaml }}"

        - name: Check for required .snar files in previous backup
          ansible.builtin.stat:
            path: "{{ incremental }}/{{ item }}"
          register: backup_snar_files_check
          loop:
            - ".config.snar"
            - ".pulp.snar"
          failed_when: false

        - name: Fail if required .snar files are missing
          ansible.builtin.fail:
            msg: |
              Incremental backup requested, but previous backup is missing .snar files.
              Previous backup: {{ incremental }}
              Missing files: {{ backup_snar_files_check.results | selectattr('stat.exists', 'equalto', false) | map(attribute='item') | list }}

              The base backup must contain .snar files generated by foremanctl.
              Create a new full backup first:
                foremanctl backup {{ backup_dir }}
          when: backup_snar_files_check.results | selectattr('stat.exists', 'equalto', false) | list | length > 0

        - name: Copy .pulp.snar from previous backup
          ansible.builtin.copy:
            src: "{{ incremental }}/.pulp.snar"
            dest: "{{ backup_dir_full }}/.pulp.snar"
            remote_src: true
            mode: '0644'
          when: not skip_pulp_content | default(false)

        - name: Fetch .config.snar from previous backup to controller
          ansible.builtin.fetch:
            src: "{{ incremental }}/.config.snar"
            dest: "{{ obsah_state_path | dirname }}/.config.snar"
            flat: true

    - name: Backup foremanctl state directory  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >
          tar -czf {{ obsah_state_path | dirname }}/foremanctl-state.tar.gz
          --listed-incremental={{ obsah_state_path | dirname }}/.config.snar
          -C {{ obsah_state_path | dirname }}
          {{ obsah_state_path | basename }}
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Copy foremanctl state archive to target
      ansible.builtin.copy:
        src: "{{ obsah_state_path | dirname }}/foremanctl-state.tar.gz"
        dest: "{{ backup_dir_full }}/foremanctl-state.tar.gz"
        mode: '0644'

    - name: Copy .config.snar to backup directory
      ansible.builtin.copy:
        src: "{{ obsah_state_path | dirname }}/.config.snar"
        dest: "{{ backup_dir_full }}/.config.snar"
        mode: '0644'

    - name: Clean up foremanctl state files on controller
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ obsah_state_path | dirname }}/foremanctl-state.tar.gz"
        - "{{ obsah_state_path | dirname }}/.config.snar"
      delegate_to: localhost
      become: false

    - name: Backup pulp content
      ansible.builtin.include_tasks:
        file: pulp_content.yaml
      when: not skip_pulp_content | default(false)

    - name: Generate backup metadata
      ansible.builtin.include_tasks:
        file: metadata.yaml

    - name: Start Foreman services
      ansible.builtin.systemd:
        name: foreman.target
        state: started

    - name: Display backup completion
      ansible.builtin.debug:
        msg: |
          Backup completed successfully.
          Location: {{ backup_dir_full }}
          Databases: {{ backup_databases_to_backup | join(', ') }}

  rescue:
    - name: Restore Foreman services on failure
      ansible.builtin.systemd:
        name: foreman.target
        state: started
      failed_when: false

    - name: Report failure
      ansible.builtin.fail:
        msg: |
          Backup failed: {{ ansible_failed_result.msg | default('Unknown error') }}
          Services have been restarted.
          Partial backup may exist at: {{ backup_dir_full }}
