---
ca_key_password: "/root/ssl-build/katello-default-ca.pwd"
ca_certificate: "/root/ssl-build/katello-default-ca.crt"
ca_key: "/root/ssl-build/katello-default-ca.key"
server_certificate: "/root/ssl-build/{{ ansible_facts['fqdn'] }}/{{ ansible_facts['fqdn'] }}-apache.crt"
server_key: "/root/ssl-build/{{ ansible_facts['fqdn'] }}/{{ ansible_facts['fqdn'] }}-apache.key"
server_ca_certificate: "/root/ssl-build/katello-server-ca.crt"
client_certificate: "/root/ssl-build/{{ ansible_facts['fqdn'] }}/{{ ansible_facts['fqdn'] }}-foreman-client.crt"
client_key: "/root/ssl-build/{{ ansible_facts['fqdn'] }}/{{ ansible_facts['fqdn'] }}-foreman-client.key"
client_ca_certificate: "{{ ca_certificate }}"
candlepin_key: "/root/ssl-build/candlepin/candlepin-tomcat.key"
candlepin_certificate: "/root/ssl-build/candlepin/candlepin-tomcat.crt"
