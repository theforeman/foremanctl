---
foreman:
  description: Base Foreman Server
foreman-proxy:
  description: Base Foreman Proxy
hammer:
  description: Foreman CLI
katello:
  description: Content and Subscription Management plugin for Foreman
  foreman:
    plugin_name: katello
  hammer: katello
google:
  description: Google Compute Engine plugin for Foreman
  hammer: foreman_google
  foreman:
    plugin_name: foreman_google
azure-rm:
  description: Azure Resource Manager plugin for Foreman
  hammer: foreman_azure_rm
  foreman:
    plugin_name: foreman_azure_rm
remote-execution:
  description: Remote Execution plugin for Foreman
  foreman:
    plugin_name: foreman_remote_execution
  foreman_proxy:
    plugin_name: remote_execution_ssh
  hammer: foreman_remote_execution
  dependencies:
    - dynflow
dynflow:
  internal: true
  foreman_proxy:
    plugin_name: dynflow
rh-cloud:
  description: Connection to RH Cloud and handling iop
  foreman:
    plugin_name: foreman_rh_cloud
  hammer: foreman_rh_cloud
  dependencies:
    - katello
iop:
  description: iop services
  dependencies:
    - rh-cloud
