---
- hosts: all
  become: true
  tasks:
    - name: 'install sos'
      package:
        name: 'sos'
        state: present

    - name: 'Generate sosreport'
      command: "sos report --batch --tmp-dir=/root"
      ignore_errors: true

    - name: 'Find sosreport file'
      find:
        paths: "/root"
        patterns: "sosreport*"
        recurse: no
      register: sosreport_files

    - name: 'Fetch sosreport'
      fetch:
        src: "{{ item.path }}"
        dest: "/tmp"
      with_items: "{{ sosreport_files.files }}"
