---
name: Test

on:
  push:
    branches:
      - master
      - '*-stable'
  pull_request:


concurrency:
  group: ${{ github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        certificate_source:
          - default
        security:
          - fapolicyd
        database:
          - internal
        box:
          - centos/stream9
          - centos/stream10
        iop:
          - disabled
    runs-on: ubuntu-24.04
    env:
      FOREMANCTL_BASE_BOX: ${{ matrix.box }}
    name: "Tests (certificates: ${{ matrix.certificate_source }}, database: ${{ matrix.database }}, security: ${{ matrix.security }}, box: ${{ matrix.box }}, iop: ${{ matrix.iop }})"
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Setup libvirt for Vagrant
        uses: voxpupuli/setup-vagrant@v0
        with:
          configure_dns: true
      - name: Install Ansible
        run: pip install --upgrade ansible-core
      - name: Setup environment
        run: ./setup-environment
      - name: Start VMs
        run: |
          ./forge vms start --vms "quadlet client ${{ matrix.database == 'external' && 'database' || '' }}"
      - name: Configure fapolicyd
        run: ansible-playbook -l quadlet ./fapolicyd.yaml
      - name: Generate sos reports
        if: ${{ always() }}
        run: ./forge sos
      - name: Setup upterm session
        if: ${{ failure() }}
        uses: owenthereal/action-upterm@v1
        with:
          ## limits ssh access and adds the ssh public key for the user which triggered the workflow
          limit-access-to-actor: true
          ## If no one connects after 5 minutes, shut down server.
          wait-timeout-minutes: 5

  # A dummy job that you can mark as a required check instead of each individual test
  test-suite:
    if: always()
    needs:
      - tests
    runs-on: ubuntu-latest
    name: Test suite
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
