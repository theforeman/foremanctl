---
- name: Kea DHCP
  hosts:
    - quadlet
  become: true
  tasks:
    - name: Install EPEL repository
      ansible.builtin.package:
        name: epel-release
        state: present

    - name: Install Kea packages
      ansible.builtin.package:
        name:
          - kea
        state: present

    - name: Configure Kea DHCP4 server
      ansible.builtin.copy:
        dest: /etc/kea/kea-dhcp4.conf
        content: |
          {
            "Dhcp4": {
              "interfaces-config": {
                "interfaces": [ "*" ]
              },
              "control-socket": {
                "socket-type": "unix",
                "socket-name": "/run/kea/kea4-ctrl-socket"
              },
              "subnet4": [
                {
                  "id": 1,
                  "subnet": "192.168.122.0/24",
                  "pools": [{ "pool": "192.168.122.100 - 192.168.122.200" }]
                }
              ],
              "lease-database": {
                "type": "memfile",
                "persist": true,
                "name": "/var/lib/kea/kea-leases4.csv"
              }
            }
          }
        mode: '0644'
        owner: root
        group: root
      notify: Restart Kea DHCP4

    - name: Configure Kea Control Agent
      ansible.builtin.copy:
        dest: /etc/kea/kea-ctrl-agent.conf
        content: |
          {
            "Control-agent": {
              "http-host": "127.0.0.1",
              "http-port": 8000,
              "control-sockets": {
                "dhcp4": {
                  "socket-type": "unix",
                  "socket-name": "/run/kea/kea4-ctrl-socket"
                }
              }
            }
          }
        mode: '0644'
        owner: root
        group: root
      notify: Restart Kea Control Agent

    - name: Start Kea services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - kea-dhcp4
        - kea-ctrl-agent

    - name: Wait for Kea Control Agent to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        state: started
        timeout: 30

  handlers:
    - name: Restart Kea DHCP4
      ansible.builtin.systemd:
        name: kea-dhcp4
        state: restarted

    - name: Restart Kea Control Agent
      ansible.builtin.systemd:
        name: kea-ctrl-agent
        state: restarted
